<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>sheep-h5-hit</title>
  </head>
  <body>
    <div id="app">
      <div id="boot-loading" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;background:#020617;color:#e2e8f0;font-family:system-ui, -apple-system, Segoe UI, Roboto, sans-serif;z-index:9999;">
        <div style="font-size:18px;font-weight:700;letter-spacing:0.2px;">准备开打…</div>
        <div id="boot-stage" style="margin-top:10px;font-size:13px;opacity:0.88;">阶段：预热中</div>
        <div style="margin-top:16px;width:220px;height:8px;background:rgba(148,163,184,0.22);border-radius:999px;overflow:hidden;">
          <div style="width:45%;height:100%;background:linear-gradient(90deg,#30e6b4,#60a5fa,#a78bfa);border-radius:999px;animation:bootbar 1.1s ease-in-out infinite;"></div>
        </div>
        <button id="boot-retry" style="margin-top:16px;display:none;padding:10px 14px;border-radius:999px;border:1px solid rgba(148,163,184,0.35);background:rgba(15,23,42,0.35);color:#e2e8f0;font-size:14px;" type="button">重试</button>
        <div id="boot-error" style="margin-top:10px;display:none;font-size:12px;opacity:0.85;max-width:280px;text-align:center;line-height:1.4;">加载失败，请重试</div>
      </div>
      <div id="game-root"></div>
      <style>
        @keyframes bootbar {
          0% { transform: translateX(-60%); }
          50% { transform: translateX(60%); }
          100% { transform: translateX(-60%); }
        }
      </style>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
